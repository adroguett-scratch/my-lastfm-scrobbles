name: Update Artists from Last.fm

on:
  schedule:
    # Run daily at 5:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read  # Only read access needed (no push)

jobs:
  update-artists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run artist database update
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python script/0_artist_db_raw.py

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: artist-database-raw
          path: data/0_artist_raw.db
          retention-days: 7
