name: Update Artists from Last.fm

on:
  schedule:
    - cron: '0 12 * * *'  # Todos los días a las 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-artists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run download artists script
        run: |
          python src/download_artists.py

      - name: Commit and push database changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/my_scrobbles.db
          git diff --staged --quiet || git commit -m "Actualizar artistas desde Last.fm [skip ci]"
          git push
