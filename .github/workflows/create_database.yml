name: Create Database

# on:
#  push:
#    branches: [ main, master ]
#  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run database creation script
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USER: ${{ secrets.LASTFM_USER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/create_db.py

      - name: Commit and push database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/1_artist.db
          git diff --staged --quiet || git commit -m "Actualizar base de datos con artistas de Last.fm [skip ci]"
          git push
